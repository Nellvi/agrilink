function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-pill').forEach((p, i) => {
    p.classList.toggle('active', Object.keys(roles)[i] === role);
  });
  const r = roles[role];
  document.getElementById('userBadge').innerHTML = `<div class="avatar" style="background:${r.color}">${r.initials}</div><span>${r.name}</span>`;
  const defaultPage = roles[role].nav[0].items[0].id;
  activeNav = defaultPage;
  renderSidebar();
  renderPage();
}

function renderSidebar() {
  const r = roles[currentRole];
  const sb = document.getElementById('sidebar');
  sb.innerHTML = r.nav.map(section => `
    <div class="nav-section">
      <div class="nav-label">${section.label}</div>
      ${section.items.map(item => `
        <div class="nav-item ${activeNav === item.id ? 'active' : ''}" onclick="navigate('${item.id}')">
          <span class="nav-icon">${item.icon}</span>${item.label}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function navigate(id) {
  activeNav = id;
  renderSidebar();
  renderPage();
}

function switchTab(el, prefix, id) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(`${prefix}-${id}`);
  if (panel) panel.classList.add('active');
}
